<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
  <meta name="theme-color" content="#0A0A0A"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Primula Rossa"/>
  <meta name="description" content="La Primula Rossa — Studio Tattoo &amp; Piercing a Como dal 1991"/>

  <title>La Primula Rossa Tattoo</title>

  <!-- PWA manifest -->
  <link rel="manifest" href="./manifest.json"/>

  <!-- Apple touch icon -->
  <link rel="apple-touch-icon" href="./assets/icons/icon-192.svg"/>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>

  <!-- CSS -->
  <link rel="stylesheet" href="./css/variables.css"/>
  <link rel="stylesheet" href="./css/base.css"/>
  <link rel="stylesheet" href="./css/components.css"/>
  <link rel="stylesheet" href="./css/screens.css"/>

  <style>
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 128px 128px;
    }

    #splash {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.4s ease;
    }

    #splash.out {
      opacity: 0;
      pointer-events: none;
    }

    .splash-logo {
      animation: splashPulse 1.4s ease infinite;
    }

    @keyframes splashPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(0.96); }
    }

    .screen-wrapper {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .screen-wrapper.active {
      z-index: 10;
    }

    @keyframes slideIn {
      from { transform: translateX(100%); }
      to { transform: translateX(0); }
    }

    @keyframes slideInBack {
      from { transform: translateX(-30%); }
      to { transform: translateX(0); }
    }

    @keyframes slideOutBack {
      from { transform: translateX(0); }
      to { transform: translateX(-30%); }
    }

    @keyframes slideOutForward {
      from { transform: translateX(0); }
      to { transform: translateX(100%); }
    }
  </style>
</head>

<body>

<!-- Splash screen -->
<div id="splash">
  <div class="splash-logo">
    <svg width="80" height="80" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="32" cy="32" r="31" fill="#111111" stroke="#2ABFBF" stroke-width="1" stroke-opacity="0.3"/>
      <ellipse cx="32" cy="20" rx="6" ry="10" fill="#2ABFBF" opacity="0.85"/>
      <ellipse cx="44" cy="26" rx="6" ry="10" fill="#2ABFBF" opacity="0.85" transform="rotate(72 44 26)"/>
      <ellipse cx="40" cy="40" rx="6" ry="10" fill="#2ABFBF" opacity="0.85" transform="rotate(144 40 40)"/>
      <ellipse cx="24" cy="40" rx="6" ry="10" fill="#2ABFBF" opacity="0.85" transform="rotate(216 24 40)"/>
      <ellipse cx="20" cy="26" rx="6" ry="10" fill="#2ABFBF" opacity="0.85" transform="rotate(288 20 26)"/>
      <circle cx="32" cy="32" r="7" fill="#C9A84C"/>
      <circle cx="32" cy="32" r="3" fill="#0A0A0A"/>
    </svg>
  </div>

  <div style="margin-top:20px;font-family:'Playfair Display',serif;font-size:18px;color:var(--text-1);letter-spacing:0.04em">
    La Primula Rossa
  </div>

  <div style="font-size:11px;color:var(--text-3);margin-top:4px;letter-spacing:0.12em;text-transform:uppercase">
    Como · Dal 1991
  </div>
</div>

<!-- App container -->
<div id="app"></div>

<!-- Data layer -->
<script src="./data/mock.js"></script>

<!-- Core -->
<script src="./js/state.js"></script>

<!-- Components -->
<script src="./js/components/cards.js"></script>
<script src="./js/components/navbar.js"></script>

<!-- Screens -->
<script src="./js/screens/onboarding.js"></script>
<script src="./js/screens/home.js"></script>
<script src="./js/screens/prenota.js"></script>
<script src="./js/screens/portfolio.js"></script>
<script src="./js/screens/artisti.js"></script>
<script src="./js/screens/shop.js"></script>
<script src="./js/screens/fidelity.js"></script>
<script src="./js/screens/chat.js"></script>
<script src="./js/screens/profilo.js"></script>
<script src="./js/screens/storia.js"></script>
<script src="./js/screens/login.js"></script>
<script src="./js/screens/register.js"></script>

<!-- Router -->
<script src="./js/app.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
      if (window.App && typeof App.init === 'function') {
        App.init();

        setTimeout(() => {
          const splash = document.getElementById('splash');

          if (splash) {
            splash.classList.add('out');
            setTimeout(() => splash.remove(), 450);
          }
        }, 500);
      } else {
        console.error('App non trovata. Controlla che ./js/app.js venga caricato correttamente.');
      }
    }, 100);
  });
</script>

</body>
</html>
